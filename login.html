  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    h1 {
      margin-bottom: 8px;
      color: #1a1a1a;
      font-size: 22px;
    }

    .desc {
      color: #888;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 16px;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #555;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #4f46e5;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }

    button:hover {
      background: #4338ca;
    }

    button:disabled {
      background: #a5b4fc;
      cursor: not-allowed;
    }

    .error {
      color: #ef4444;
      font-size: 13px;
      margin-top: 12px;
      display: none;
      background: #fef2f2;
      padding: 10px;
      border-radius: 6px;
      text-align: center;
    }

    /* 深色主题适配 */
    @media (prefers-color-scheme: dark) {
      body {
        background: #0f172a;
      }

      .container {
        background: #1e293b;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      }

      h1 {
        color: #f1f5f9;
      }

      .desc {
        color: #94a3b8;
      }

      label {
        color: #cbd5e1;
      }

      input {
        background: #334155;
        border-color: #475569;
        color: #e2e8f0;
      }

      input:focus {
        border-color: #818cf8;
      }

      input::placeholder {
        color: #64748b;
      }

      button {
        background: #6366f1;
      }

      button:hover {
        background: #4f46e5;
      }

      button:disabled {
        background: #3730a3;
      }

      .error {
        background: #7f1d1d;
        color: #fca5a5;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="icon">🔐</div>
    <h1>访问验证</h1>
    <p class="desc">请输入访问密钥以继续</p>
    <form id="keyForm">
      <div class="form-group">
        <label for="accessKey">访问密钥</label>
        <input type="password" id="accessKey" placeholder="请输入预设的访问密钥" required autocomplete="off">
      </div>
      <button type="submit" id="submitBtn">验证进入</button>
    </form>
    <div class="error" id="errorMsg"></div>
  </div>

  <script>
    // ========== 新增：先检查是否需要验证 ==========
    async function checkAuthRequired() {
      try {
        const response = await fetch('/api/verify-key');
        const data = await response.json();

        if (!data.requiresAuth) {
          // 不需要验证，直接跳转到首页
          window.location.href = '/';
        }
      } catch (err) {
        console.error('检查验证状态失败:', err);
      }
    }

    // 页面加载时先检查
    checkAuthRequired();
    // ===========================================

    const keyForm = document.getElementById('keyForm');
    const accessKeyInput = document.getElementById('accessKey');
    const submitBtn = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('errorMsg');

    keyForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const accessKey = accessKeyInput.value.trim();

      if (!accessKey) {
        showError('请输入访问密钥');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = '验证中...';
      errorMsg.style.display = 'none';

      try {
        const response = await fetch('/api/verify-key', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key: accessKey })
        });

        const data = await response.json();

        if (response.ok) {
          window.location.href = '/';
        } else {
          showError(data.error || '密钥错误，请重试');
        }
      } catch (err) {
        showError('网络错误，请检查网络后重试');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '验证进入';
      }
    });

    function showError(message) {
      errorMsg.textContent = message;
      errorMsg.style.display = 'block';
    }
  </script>
</body>

</html>
